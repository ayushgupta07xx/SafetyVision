name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ruff lint + mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install lint tools
        run: pip install ruff mypy
      - name: Ruff
        run: ruff check .
      - name: Mypy
        # mypy uses ignore_missing_imports=true (pyproject) so heavy deps
        # (torch, ultralytics, prophet, qdrant, etc.) don't need to be installed.
        run: mypy core/ agent/ analytics/

  test:
    name: pytest + coverage (>=60%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install CPU-only torch (avoids pulling CUDA wheels)
        run: |
          python -m pip install --upgrade pip
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
      - name: Install project (editable, dev extras)
        run: pip install -e ".[dev]"
      - name: Run tests with coverage gate
        # -m "not slow" excludes real-model E2E tests that download
        # from HF Hub. Those are run locally; see tests/test_smoke_real_model.py.
        run: |
          pytest tests/ -m "not slow" \
            --cov --cov-report=term-missing \
            --cov-fail-under=60

  link_check:
    name: HF Hub model repo reachable
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: HEAD request to HF Hub model repo
        run: |
          status=$(curl -fsSL -o /dev/null -w "%{http_code}" \
            https://huggingface.co/ayushgupta7777/safetyvision-yolov8)
          echo "Got HTTP $status"
          test "$status" = "200"
